<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1260" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6adc8"/>
        </marker>
        <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 0 L 5 10 z" fill="#a6adc8"/>
        </marker>
    </defs>
    <style>
        .bg { fill: #1e1e2e; }
        .panel { fill: #181825; stroke: #313244; stroke-width: 2px; }
        .title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #cdd6f4; }
        .node-text { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #f8f8f2; text-anchor: middle; }
        .sub-text { font-family: sans-serif; font-size: 12px; fill: #bac2de; text-anchor: middle; }
        .box { fill: #313244; stroke-width: 2px; rx: 8px; }
        .edge { stroke: #a6adc8; stroke-width: 2px; fill: none; }
        .edge-dashed { stroke: #a6adc8; stroke-width: 2px; stroke-dasharray: 6,4; fill: none; }
        .edge-label-bg { fill: #1e1e2e; rx: 4px; }
        .edge-label { font-family: sans-serif; font-size: 13px; fill: #a6e3a1; font-weight: bold; text-anchor: middle; }
    </style>
    
    <rect width="100%" height="100%" class="bg"/>

    <rect x="30" y="20" width="900" height="280" rx="12" class="panel"/>
    <text x="480" y="55" class="title" text-anchor="middle">阶段一：本来的关系</text>
    
    <line x1="380" y1="110" x2="580" y2="110" class="edge"/>
    <rect x="460" y="100" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="115" class="edge-label">夫妻</text>

    <line x1="380" y1="250" x2="580" y2="250" class="edge"/>
    <rect x="460" y="240" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="255" class="edge-label">夫妻</text>

    <line x1="740" y1="140" x2="740" y2="220" class="edge-dashed"/>
    <rect x="710" y="170" width="60" height="20" class="edge-label-bg"/>
    <text x="740" y="185" class="edge-label">亲姐妹</text>

    <rect x="60" y="80" width="320" height="60" class="box" stroke="#89b4fa"/>
    <text x="220" y="116" class="node-text">川島伊作 (夫)</text>

    <rect x="580" y="80" width="320" height="60" class="box" stroke="#f38ba8"/>
    <text x="740" y="116" class="node-text">川島律子 (妻)</text>

    <rect x="60" y="220" width="320" height="60" class="box" stroke="#a6e3a1"/>
    <text x="220" y="256" class="node-text">各務順一 (夫)</text>

    <rect x="580" y="220" width="320" height="60" class="box" stroke="#cba6f7"/>
    <text x="740" y="256" class="node-text">各務結子 (妻)</text>


    <rect x="30" y="330" width="900" height="280" rx="12" class="panel"/>
    <text x="480" y="365" class="title" text-anchor="middle">阶段二：偷天换日与谋杀</text>
    
    <line x1="380" y1="420" x2="580" y2="420" class="edge"/>
    <rect x="460" y="410" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="425" class="edge-label">夫妻</text>

    <line x1="740" y1="450" x2="740" y2="530" class="edge-dashed" marker-end="url(#arrow-down)"/>
    <rect x="695" y="480" width="90" height="20" class="edge-label-bg"/>
    <text x="740" y="495" class="edge-label" fill="#f38ba8">身份互换</text>

    <rect x="60" y="390" width="320" height="60" class="box" stroke="#89b4fa"/>
    <text x="220" y="426" class="node-text">川島伊作 (夫)</text>

    <rect x="580" y="390" width="320" height="60" class="box" stroke="#cba6f7"/>
    <text x="740" y="413" class="node-text">各務結子 (妻)</text>
    <text x="740" y="433" class="sub-text">(顶替身份，伪装成姐姐“律子”)</text>

    <rect x="60" y="530" width="320" height="60" class="box" stroke="#a6e3a1"/>
    <text x="220" y="566" class="node-text">各務順一 (夫)</text>

    <rect x="580" y="530" width="320" height="60" class="box" stroke="#f38ba8" fill="#1e1e2e"/>
    <text x="740" y="553" class="node-text" fill="#a6adc8">川島律子</text>
    <text x="740" y="573" class="sub-text">(被杀害，伪装成“结子”在车库吸入尾气身亡)</text>


    <rect x="30" y="640" width="900" height="280" rx="12" class="panel"/>
    <text x="480" y="675" class="title" text-anchor="middle">阶段三：金蝉脱壳</text>
    
    <line x1="380" y1="730" x2="580" y2="730" class="edge-dashed"/>
    <rect x="460" y="720" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="735" class="edge-label" fill="#bac2de">离婚</text>

    <line x1="380" y1="870" x2="580" y2="870" class="edge-dashed"/>
    
    <line x1="580" y1="730" x2="380" y2="870" class="edge-dashed" marker-end="url(#arrow)"/>

    <rect x="60" y="700" width="320" height="60" class="box" stroke="#89b4fa"/>
    <text x="220" y="736" class="node-text">川島伊作</text>

    <rect x="580" y="700" width="320" height="60" class="box" stroke="#cba6f7"/>
    <text x="740" y="723" class="node-text">各務結子</text>
    <text x="740" y="743" class="sub-text">(以“律子”的身份活下来，赴美与顺一汇合)</text>

    <rect x="60" y="840" width="320" height="60" class="box" stroke="#a6e3a1"/>
    <text x="220" y="876" class="node-text">各務順一</text>

    <rect x="580" y="840" width="320" height="60" class="box" stroke="#f38ba8" fill="#1e1e2e" stroke-dasharray="4,4"/>
    <text x="740" y="863" class="node-text" fill="#a6adc8">川島律子</text>
    <text x="740" y="883" class="sub-text">(真身已死，以“结子”的身份被安葬)</text>


    <rect x="30" y="950" width="900" height="280" rx="12" class="panel"/>
    <text x="480" y="985" class="title" text-anchor="middle">阶段四：世人的眼光</text>
    
    <line x1="380" y1="1040" x2="580" y2="1040" class="edge-dashed"/>
    <rect x="460" y="1030" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="1045" class="edge-label" fill="#bac2de">离婚</text>

    <line x1="380" y1="1180" x2="580" y2="1180" class="edge-dashed"/>
    <rect x="460" y="1170" width="40" height="20" class="edge-label-bg"/>
    <text x="480" y="1185" class="edge-label" fill="#bac2de">丧偶</text>

    <line x1="580" y1="1040" x2="380" y2="1180" class="edge-dashed" marker-end="url(#arrow)"/>

    <rect x="60" y="1010" width="320" height="60" class="box" stroke="#89b4fa"/>
    <text x="220" y="1046" class="node-text">川島伊作</text>

    <rect x="580" y="1010" width="320" height="60" class="box" stroke="#f38ba8"/>
    <text x="740" y="1033" class="node-text">川島律子</text>
    <text x="740" y="1053" class="sub-text">(世人眼中：遭背叛后离婚，赴美后与顺一“重组家庭”)</text>

    <rect x="60" y="1150" width="320" height="60" class="box" stroke="#a6e3a1"/>
    <text x="220" y="1186" class="node-text">各務順一</text>

    <rect x="580" y="1150" width="320" height="60" class="box" stroke="#cba6f7" stroke-dasharray="4,4"/>
    <text x="740" y="1173" class="node-text">各務結子</text>
    <text x="740" y="1193" class="sub-text">(世人眼中：因与姐夫的不伦之恋曝光，畏罪自杀)</text>

</svg>
